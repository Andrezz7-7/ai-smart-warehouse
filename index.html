<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Warehouse — AMR Simulator v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap');

  :root {
    --bg: #060a0f;
    --panel: #0b1118;
    --border: #1a2a3a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #00ff88;
    --warn: #ffcc00;
    --danger: #ff3366;
    --text: #c8d8e8;
    --muted: #4a6070;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent2); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--accent3); letter-spacing: 2px;
  }
  .live-dot {
    width: 8px; height: 8px; background: var(--accent3);
    border-radius: 50%; animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(0.8)} }
  .time-display { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* LEFT SIDEBAR */
  .sidebar-left {
    width: 200px; background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
  .sidebar-title {
    font-family: 'Orbitron', monospace; font-size: 9px;
    letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }

  .robot-card {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 6px; margin-bottom: 4px;
    background: rgba(255,255,255,0.02); border: 1px solid transparent;
    transition: all .3s;
  }
  .robot-card.active { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
  .robot-card.charging { border-color: rgba(255,204,0,0.3); background: rgba(255,204,0,0.05); }
  .robot-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .robot-info { flex: 1; min-width: 0; }
  .robot-name { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text); }
  .robot-status-text { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .battery-bar {
    width: 28px; height: 10px; border: 1px solid var(--border);
    border-radius: 2px; overflow: hidden; flex-shrink: 0;
  }
  .battery-fill { height: 100%; transition: width .5s, background .5s; border-radius: 1px; }

  .orders-list { flex: 1; overflow-y: auto; padding: 8px; }
  .orders-list::-webkit-scrollbar { width: 3px; }
  .orders-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .order-item {
    padding: 7px 9px; border-radius: 5px; border-left: 3px solid transparent;
    margin-bottom: 4px; font-family: 'Share Tech Mono', monospace; font-size: 10px;
    background: rgba(255,255,255,0.02); animation: slideIn .3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .order-item.pending { border-color: var(--warn); }
  .order-item.picking { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .order-item.done { border-color: var(--accent3); opacity: .6; }
  .order-id { color: var(--text); font-weight: bold; font-size: 11px; }
  .order-sku { color: var(--muted); margin-top: 2px; }
  .order-status-badge {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    font-size: 8px; margin-top: 2px; letter-spacing: 1px;
  }
  .order-item.pending .order-status-badge { background: rgba(255,204,0,.2); color: var(--warn); }
  .order-item.picking .order-status-badge { background: rgba(0,212,255,.2); color: var(--accent); }
  .order-item.done .order-status-badge { background: rgba(0,255,136,.15); color: var(--accent3); }

  /* CANVAS */
  .warehouse-wrap {
    flex: 1; position: relative; overflow: hidden;
    background:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #warehouseCanvas { position: absolute; top:0; left:0; width:100%; height:100%; }

  /* RIGHT SIDEBAR */
  .sidebar-right {
    width: 180px; background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .kpi-grid { display: grid; gap: 8px; padding: 12px; }
  .kpi-card {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top:0; left:0; right:0;
    height: 2px; background: var(--accent);
  }
  .kpi-card.orange::before { background: var(--accent2); }
  .kpi-card.green::before { background: var(--accent3); }
  .kpi-card.purple::before { background: #a855f7; }
  .kpi-label {
    font-family: 'Orbitron', monospace; font-size: 7px;
    letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px;
  }
  .kpi-value { font-family: 'Share Tech Mono', monospace; font-size: 22px; color: var(--accent); line-height: 1; }
  .kpi-card.orange .kpi-value { color: var(--accent2); }
  .kpi-card.green .kpi-value { color: var(--accent3); }
  .kpi-card.purple .kpi-value { color: #a855f7; }
  .kpi-unit { font-size: 9px; color: var(--muted); margin-top: 2px; }

  .event-log { flex: 1; overflow-y: auto; padding: 8px; border-top: 1px solid var(--border); }
  .event-log::-webkit-scrollbar { width: 3px; }
  .event-log::-webkit-scrollbar-thumb { background: var(--border); }
  .log-entry {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted);
    margin-bottom: 4px; padding: 3px 5px; border-radius: 3px;
    animation: fadeIn .3s ease; line-height: 1.4;
  }
  .log-entry.info { color: var(--accent); }
  .log-entry.warn { color: var(--warn); }
  .log-entry.success { color: var(--accent3); }
  .log-entry.error { color: var(--danger); }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; background: var(--panel);
    border-top: 1px solid var(--border); flex-shrink: 0; gap: 10px;
  }
  .footer-metrics { display: flex; gap: 24px; flex: 1; }
  .footer-metric { display: flex; flex-direction: column; align-items: center; }
  .footer-metric-val { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--text); }
  .footer-metric-label { font-family: 'Orbitron', monospace; font-size: 7px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  .footer-controls { display: flex; gap: 8px; }
  .btn {
    font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 7px 14px; border-radius: 5px;
    border: 1px solid var(--border); cursor: pointer; transition: all .2s;
    background: transparent; color: var(--text);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,.2); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: var(--accent); color: var(--bg); }
  .btn.success { border-color: var(--accent3); color: var(--accent3); }
  .btn.success:hover { background: var(--accent3); color: var(--bg); }
  .speed-control {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted);
  }
  .speed-btn {
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 3px; cursor: pointer;
    font-size: 12px; color: var(--text); background: transparent; transition: all .2s;
  }
  .speed-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speed-val { color: var(--accent); min-width: 30px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="logo">AI Smart <span>Warehouse</span> — AMR Control</div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE SIM</div>
    <div class="time-display" id="simTime">SIM TIME: 00:00:00</div>
  </div>
</header>

<div class="main">
  <div class="sidebar-left">
    <div class="sidebar-section">
      <div class="sidebar-title">Fleet AMR</div>
      <div id="robotCards"></div>
    </div>
    <div class="sidebar-title" style="padding:10px 12px 4px;">Coda Ordini</div>
    <div class="orders-list" id="ordersList"></div>
  </div>

  <div class="warehouse-wrap">
    <canvas id="warehouseCanvas"></canvas>
  </div>

  <div class="sidebar-right">
    <div class="sidebar-title" style="padding:12px 12px 4px;">KPI Operativi</div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Ordini/Ora</div>
        <div class="kpi-value" id="kpiOrders">0</div>
        <div class="kpi-unit">throughput</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">Km Totali</div>
        <div class="kpi-value" id="kpiKm">0.0</div>
        <div class="kpi-unit">km percorsi</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Avg Picking</div>
        <div class="kpi-value" id="kpiPicking">0</div>
        <div class="kpi-unit">secondi</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">Completati</div>
        <div class="kpi-value" id="kpiDone">0</div>
        <div class="kpi-unit">ordini totali</div>
      </div>
    </div>
    <div class="sidebar-title" style="padding:8px 12px 4px; border-top: 1px solid var(--border);">Event Log</div>
    <div class="event-log" id="eventLog"></div>
  </div>
</div>

<footer>
  <div class="footer-metrics">
    <div class="footer-metric">
      <div class="footer-metric-val" id="ftTotal">0</div>
      <div class="footer-metric-label">Ordini Completati</div>
    </div>
    <div class="footer-metric">
      <div class="footer-metric-val" id="ftActive">0</div>
      <div class="footer-metric-label">Robot Attivi</div>
    </div>
    <div class="footer-metric">
      <div class="footer-metric-val" id="ftQueue">0</div>
      <div class="footer-metric-label">In Coda</div>
    </div>
    <div class="footer-metric">
      <div class="footer-metric-val" id="ftEfficiency">0%</div>
      <div class="footer-metric-label">Efficienza</div>
    </div>
    <div class="footer-metric">
      <div class="footer-metric-val" id="ftUptime">00:00</div>
      <div class="footer-metric-label">Uptime Sistema</div>
    </div>
  </div>
  <div class="speed-control">
    <span>SPEED</span>
    <button class="speed-btn" id="speedDown">−</button>
    <span class="speed-val" id="speedVal">1×</span>
    <button class="speed-btn" id="speedUp">+</button>
  </div>
  <div class="footer-controls">
    <button class="btn primary" id="btnAddOrder">+ Ordine</button>
    <button class="btn success" id="btnBatchOrder">+ Batch (5)</button>
    <button class="btn" id="btnPause">⏸ Pausa</button>
  </div>
</footer>

<script>
const canvas = document.getElementById('warehouseCanvas');
const ctx = canvas.getContext('2d');

// ─── CONFIG ───
const CELL = 40;
let COLS, ROWS;
let paused = false;
let simSeconds = 0;
let speedMult = 1;

// ─── WAREHOUSE LAYOUT ───
let SHELVES = [];
let CHARGING_STATIONS = [];
let OUTPUT_ZONE = null;
let INPUT_ZONE = null;
let WALKABLE = [];
let SHELF_SET = new Set();

// ─── QUEUES ───
let inputQueue = [];
let inputPackIdCounter = 1;
let outputQueue = [];

// ─── TRUCK ───
const TRUCK_INTERVAL = 35;
let truckTimer = TRUCK_INTERVAL;
let truck = null;

function buildLayout() {
  SHELVES = [];
  SHELF_SET = new Set();

  const rackRows = [2, 4, 6, 8, 10, 12];
  const rackCols = [2, 3, 4, 6, 7, 8, 10, 11, 12, 14, 15, 16];
  const skus = ['SKU-A1','SKU-B2','SKU-C3','SKU-D4','SKU-E5','SKU-F6','SKU-G7','SKU-H8','SKU-J9','SKU-K10'];
  let id = 0;
  rackRows.forEach(r => {
    if (r >= ROWS - 2) return;
    rackCols.forEach(c => {
      if (c >= COLS - 2) return;
      SHELVES.push({
        col: c, row: r, id: id++,
        sku: skus[Math.floor(Math.random() * skus.length)],
        active: false, pickAnim: 0, hasPack: false
      });
      SHELF_SET.add(`${c},${r}`);
    });
  });

  CHARGING_STATIONS = [
    { col: 1, row: ROWS - 2 },
    { col: 2, row: ROWS - 2 },
    { col: 3, row: ROWS - 2 },
    { col: 4, row: ROWS - 2 },
    { col: 5, row: ROWS - 2 },
  ];

  OUTPUT_ZONE = { col: COLS - 3, row: ROWS - 3 };
  INPUT_ZONE  = { col: COLS - 3, row: 1 };

  buildWalkable();
}

function buildWalkable() {
  WALKABLE = [];
  for (let r = 0; r < ROWS; r++) {
    WALKABLE[r] = [];
    for (let c = 0; c < COLS; c++) {
      WALKABLE[r][c] = !SHELF_SET.has(`${c},${r}`);
    }
  }
}

// ─── A* PATHFINDING — pure orthogonal, never crosses shelves ───
function astar(startCol, startRow, goalCol, goalRow) {
  // If goal is a shelf, find nearest walkable adjacent cell
  if (!isWalkable(goalCol, goalRow)) {
    const adj = getAdjacentWalkable(goalCol, goalRow);
    if (!adj) return null;
    goalCol = adj.col;
    goalRow = adj.row;
  }
  // If start is somehow not walkable, find nearest walkable
  if (!isWalkable(startCol, startRow)) {
    const adj = getAdjacentWalkable(startCol, startRow);
    if (!adj) return null;
    startCol = adj.col;
    startRow = adj.row;
  }

  if (startCol === goalCol && startRow === goalRow) return [];

  // Min-heap via sorted array (sufficient for our grid sizes)
  const open = [];
  const gScore = new Map();
  const fScore = new Map();
  const cameFrom = new Map();
  const closed = new Set();

  const key = (c, r) => `${c},${r}`;
  const h = (c, r) => Math.abs(c - goalCol) + Math.abs(r - goalRow);

  const sk = key(startCol, startRow);
  gScore.set(sk, 0);
  fScore.set(sk, h(startCol, startRow));
  open.push({ col: startCol, row: startRow, f: h(startCol, startRow) });

  const DIRS = [[-1,0],[1,0],[0,-1],[0,1]];
  const MAX_ITER = 4000;
  let iter = 0;

  while (open.length > 0 && iter++ < MAX_ITER) {
    // Pop node with lowest f
    open.sort((a, b) => a.f - b.f);
    const cur = open.shift();
    const ck = key(cur.col, cur.row);

    if (cur.col === goalCol && cur.row === goalRow) {
      // Reconstruct
      const path = [];
      let k = ck;
      while (cameFrom.has(k)) {
        const [c, r] = k.split(',').map(Number);
        path.unshift({ col: c, row: r, x: (c + 0.5) * CELL, y: (r + 0.5) * CELL });
        k = cameFrom.get(k);
      }
      // Add goal
      path.push({ col: goalCol, row: goalRow, x: (goalCol + 0.5) * CELL, y: (goalRow + 0.5) * CELL });
      return path;
    }

    closed.add(ck);

    for (const [dc, dr] of DIRS) {
      const nc = cur.col + dc;
      const nr = cur.row + dr;
      if (nc < 0 || nr < 0 || nc >= COLS || nr >= ROWS) continue;
      if (!isWalkable(nc, nr)) continue;
      const nk = key(nc, nr);
      if (closed.has(nk)) continue;

      const tg = (gScore.get(ck) || 0) + 1;
      if (!gScore.has(nk) || tg < gScore.get(nk)) {
        cameFrom.set(nk, ck);
        gScore.set(nk, tg);
        const f = tg + h(nc, nr);
        fScore.set(nk, f);
        // Only add if not already in open
        if (!open.find(n => n.col === nc && n.row === nr)) {
          open.push({ col: nc, row: nr, f });
        } else {
          // Update f of existing node
          const existing = open.find(n => n.col === nc && n.row === nr);
          if (existing) existing.f = f;
        }
      }
    }
  }
  return null;
}

function isWalkable(c, r) {
  if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return false;
  return WALKABLE[r] && WALKABLE[r][c] === true;
}

function getAdjacentWalkable(c, r) {
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (const [dc, dr] of dirs) {
    const nc = c + dc, nr = r + dr;
    if (isWalkable(nc, nr)) return { col: nc, row: nr };
  }
  // try diagonals as last resort
  const diags = [[-1,-1],[1,-1],[-1,1],[1,1]];
  for (const [dc, dr] of diags) {
    const nc = c + dc, nr = r + dr;
    if (isWalkable(nc, nr)) return { col: nc, row: nr };
  }
  return null;
}

function waypointsFromPath(path) {
  if (!path || path.length === 0) return [];
  return path.map(p => ({ x: p.x, y: p.y }));
}

// ─── ROBOTS ───
const ROBOT_COLORS = ['#00d4ff','#ff6b35','#00ff88','#a855f7','#ffcc00'];
const ROBOT_NAMES  = ['AMR-01','AMR-02','AMR-03','AMR-04','AMR-05'];

let robots = [];
let totalKm = 0;
let completedOrders = [];
let orders = [];
let orderIdCounter = 1;
let logEntries = [];

function initRobots() {
  robots = ROBOT_NAMES.map((name, i) => ({
    id: i,
    name,
    color: ROBOT_COLORS[i],
    x: (CHARGING_STATIONS[i].col + 0.5) * CELL,
    y: (CHARGING_STATIONS[i].row + 0.5) * CELL,
    battery: 85 + Math.random() * 15,
    status: 'idle',
    // status values: idle | moving | picking | charging | goCharge | fetching
    // 'goCharge' = going to charger (task already completed, no pack)
    task: null,
    fetchTask: null,
    path: [],
    targetX: null,
    targetY: null,
    pickTimer: 0,
    trail: [],
    glowAlpha: 0,
    carryingPack: null,
    // Flag: after current delivery/stow completes, go charge
    needsCharge: false,
  }));
}

// ─── ORDERS ───
const SKU_POOL = ['SKU-A1','SKU-B2','SKU-C3','SKU-D4','SKU-E5','SKU-F6','SKU-G7','SKU-H8','SKU-J9','SKU-K10'];

function createOrder() {
  // Find a shelf with a pack
const packed = SHELVES.filter(s => s.hasPack && !isShelfReserved(s.id));

let shelf = null;

if (packed.length > 0) {
  shelf = packed[Math.floor(Math.random() * packed.length)];
} else {
  // fallback: scegli qualsiasi shelf e rigenera stock virtuale
  const any = SHELVES[Math.floor(Math.random() * SHELVES.length)];
  any.hasPack = true;
  shelf = any;
}

  return {
    id: `ORD-${String(orderIdCounter++).padStart(4,'0')}`,
    sku: shelf.sku,
    shelfId: shelf.id,
    status: 'pending',
    createdAt: simSeconds,
    startedAt: null,
    completedAt: null,
    robotId: null,
  };
}

// Check if a shelf is already reserved by a robot task
function isShelfReserved(shelfId) {
  return robots.some(r => r.task && r.task.shelfId === shelfId && r.task.status !== 'done');
}

function addOrder() {
  const o = createOrder();
  if (!o) {
    addLog('Nessuno scaffale disponibile per ordine', 'warn');
    return;
  }
  orders.push(o);
  addLog(`Nuovo ordine ${o.id} — ${o.sku}`, 'info');
  renderOrders();
}

function addBatchOrders(n) {
  for (let i = 0; i < n; i++) addOrder();
}

// ─── INPUT PACK SPAWN ───
function spawnInputPack() {
  if (inputQueue.length >= 6) return;
  const sku = SKU_POOL[Math.floor(Math.random() * SKU_POOL.length)];
  inputQueue.push({ id: inputPackIdCounter++, sku, status: 'waiting' });
  addLog(`📦 Pacco INPUT: ${sku}`, 'info');
}

// ─── NAVIGATE: plan path and set first target ───
function navigateTo(robot, col, row) {
  const rc = { col: Math.floor(robot.x / CELL), row: Math.floor(robot.y / CELL) };
  const rawPath = astar(rc.col, rc.row, col, row);
  if (rawPath && rawPath.length > 0) {
    robot.path = waypointsFromPath(rawPath);
    robot.targetX = robot.path[0].x;
    robot.targetY = robot.path[0].y;
  } else {
    // Fallback: go directly (should not happen with correct walkable grid)
    robot.path = [{ x: (col + 0.5) * CELL, y: (row + 0.5) * CELL }];
    robot.targetX = robot.path[0].x;
    robot.targetY = robot.path[0].y;
  }
}

// ─── SEND ROBOT TO CHARGER ───
function sendToCharger(robot) {
  robot.status = 'goCharge';
  robot.needsCharge = false;
  robot.task = null;
  robot.fetchTask = null;
  robot.carryingPack = null;
  const cs = CHARGING_STATIONS[robot.id];
  navigateTo(robot, cs.col, cs.row);
  addLog(`${robot.name} → ricarica ⚡`, 'warn');
}

// ─── DISPATCH: assign idle robots to tasks ───
function dispatchAll() {
  // Priority 1: stow packs from INPUT zone
  const waitingPacks = inputQueue.filter(p => p.status === 'waiting');
  for (const pack of waitingPacks) {
    const freeRobot = robots.find(r =>
      r.status === 'idle' && r.battery > 25 && !r.needsCharge
    );
    if (!freeRobot) break;

    // Find an empty shelf not already targeted by another robot
    const emptyShelf = SHELVES.find(s =>
      !s.hasPack &&
      !robots.some(rb => rb.fetchTask && rb.fetchTask.destShelf && rb.fetchTask.destShelf.id === s.id)
    );
    if (!emptyShelf) break;

    pack.status = 'assigned';
    freeRobot.status = 'fetching';
    freeRobot.fetchTask = { pack, destShelf: emptyShelf, phase: 'goInput' };
    navigateTo(freeRobot, INPUT_ZONE.col, INPUT_ZONE.row);
    addLog(`${freeRobot.name} → INPUT fetch ${pack.sku}`, 'info');
  }

  // Priority 2: shipping orders
  const pendingOrders = orders.filter(o => o.status === 'pending');
  for (const order of pendingOrders) {
    const shelf = SHELVES[order.shelfId];
    if (!shelf || !shelf.hasPack) {
      // Try to find another shelf with this SKU
      const alt = SHELVES.find(s => s.sku === order.sku && s.hasPack && !isShelfReserved(s.id));
      if (alt) {
        order.shelfId = alt.id;
        order.sku = alt.sku;
      } else {
        continue;
      }
    }

    const freeRobot = robots.find(r =>
      r.status === 'idle' && r.battery > 25 && !r.needsCharge && !r.task && !r.fetchTask
    );
    if (!freeRobot) break;

    order.status = 'picking';
    order.robotId = freeRobot.id;
    order.startedAt = simSeconds;

    freeRobot.status = 'moving';
    freeRobot.task = order;
    SHELVES[order.shelfId].active = true;

    navigateTo(freeRobot, SHELVES[order.shelfId].col, SHELVES[order.shelfId].row);
    addLog(`${freeRobot.name} → ${order.id} [${order.sku}]`, 'info');
    renderOrders();
  }
}

// ─── MAIN UPDATE LOOP ───
let lastTime = 0;

function update(timestamp) {
  if (paused) { requestAnimationFrame(update); return; }
  const raw = Math.min((timestamp - lastTime) / 1000, 0.1);
  const dt = raw * speedMult;
  lastTime = timestamp;
  simSeconds += dt;

  // Spawn input packs
  if (Math.random() < 0.008 * speedMult) spawnInputPack();

  // Auto-generate orders
  const activePending = orders.filter(o => o.status !== 'done').length;
  if (Math.random() < 0.005 && activePending < 6) addOrder();

  // Dispatch periodically
  if (Math.random() < 0.08 * speedMult) dispatchAll();

  // ─── TRUCK ───
  truckTimer -= dt;
  if (truckTimer <= 0 && !truck && outputQueue.length >= 5) {
    truck = {
      x: (OUTPUT_ZONE.col + 3) * CELL,
      y: (OUTPUT_ZONE.row - 1) * CELL,
      targetX: (OUTPUT_ZONE.col - 0.5) * CELL,
      targetY: (OUTPUT_ZONE.row - 1) * CELL,
      state: 'arriving',
      loadTimer: 5,
      packCount: 0,
    };
    addLog('🚛 Camion in arrivo alla zona OUTPUT', 'warn');
  }

  if (truck) {
    if (truck.state === 'arriving') {
      const dx = truck.targetX - truck.x;
      const spd = 80 * dt;
      if (Math.abs(dx) < spd + 2) {
        truck.x = truck.targetX;
        truck.state = 'loading';
        addLog('🚛 Camion in carico...', 'warn');
      } else {
        truck.x += Math.sign(dx) * spd;
      }
    } else if (truck.state === 'loading') {
      truck.loadTimer -= dt;
      if (outputQueue.length > 0 && Math.random() < 0.5 * speedMult) {
        const pack = outputQueue.shift();
        truck.packCount++;
        addLog(`🚛 Pacco ${pack.sku} caricato`, 'success');
      }
      if (truck.loadTimer <= 0) {
        truck.state = 'departing';
        addLog(`🚛 Camion parte con ${truck.packCount} pacchi`, 'success');
        truckTimer = TRUCK_INTERVAL;
      }
    } else if (truck.state === 'departing') {
      truck.x += 80 * dt;
      if (truck.x > (OUTPUT_ZONE.col + 5) * CELL) truck = null;
    }
  }

  // ─── UPDATE EACH ROBOT ───
  robots.forEach(robot => {
    // Battery drain
    if (['moving','picking','fetching','goCharge'].includes(robot.status)) {
      robot.battery = Math.max(0, robot.battery - 0.2 * dt * speedMult);
    } else if (robot.status === 'charging') {
      robot.battery = Math.min(100, robot.battery + 1.5 * dt * speedMult);
      if (robot.battery >= 100) {
        robot.battery = 100;
        robot.status = 'idle';
        robot.needsCharge = false;
        addLog(`${robot.name} carica completa 100% ⚡`, 'success');
      }
    }

    // ── Battery low check (< 25%) ──
    // Set needsCharge flag. Do NOT abort current task if carrying a pack.
    // The flag is checked at task completion before picking a new job.
    if (robot.battery < 25 && !robot.needsCharge &&
        robot.status !== 'charging' && robot.status !== 'goCharge') {
      robot.needsCharge = true;
      addLog(`${robot.name} batteria bassa (${Math.round(robot.battery)}%) — finirà task`, 'warn');
    }

    // If idle and needsCharge → go charge now (no task, no pack)
    if (robot.status === 'idle' && robot.needsCharge) {
      sendToCharger(robot);
      return;
    }

    // ── PICKING timer ──
    if (robot.status === 'picking') {
      robot.pickTimer -= dt;
      robot.glowAlpha = Math.max(0, robot.glowAlpha - dt * 0.3);
      if (robot.pickTimer <= 0) {
        // Done picking — pick up pack, head to OUTPUT
        const shelf = SHELVES[robot.task?.shelfId];
        if (shelf) {
          shelf.active = false;
          shelf.hasPack = false;
          robot.carryingPack = { sku: robot.task.sku };
        }
        robot.status = 'moving';
        if (robot.task) robot.task.status = 'delivering';
        navigateTo(robot, OUTPUT_ZONE.col, OUTPUT_ZONE.row);
        addLog(`${robot.name} → OUTPUT con ${robot.task?.sku}`, 'info');
      }
      return;
    }

    // ── MOVEMENT ──
    if (['moving','goCharge','fetching'].includes(robot.status) && robot.targetX !== null) {
      const dx = robot.targetX - robot.x;
      const dy = robot.targetY - robot.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 90 * dt;

      if (dist < 4) {
        // Snap to waypoint
        robot.x = robot.targetX;
        robot.y = robot.targetY;
        robot.path.shift();

        if (robot.path.length > 0) {
          robot.targetX = robot.path[0].x;
          robot.targetY = robot.path[0].y;
        } else {
          // Reached final destination
          robot.targetX = null;
          robot.targetY = null;
          handleArrival(robot);
        }
      } else {
        robot.x += (dx / dist) * speed;
        robot.y += (dy / dist) * speed;
        totalKm += speed / 1000;
      }

      // Trail
      robot.trail.push({ x: robot.x, y: robot.y, alpha: 0.5 });
      if (robot.trail.length > 30) robot.trail.shift();
    }

    // Fade trail
    robot.trail = robot.trail
      .map(t => ({ ...t, alpha: t.alpha * 0.96 }))
      .filter(t => t.alpha > 0.01);
  });

  updateMetrics();
  renderRobotCards();
  drawWarehouse();
  requestAnimationFrame(update);
}

// ─── HANDLE ARRIVAL at final waypoint ───
function handleArrival(robot) {

  // ── Arrived at charger ──
  if (robot.status === 'goCharge') {
    robot.status = 'charging';
    robot.needsCharge = false;
    addLog(`${robot.name} in ricarica ⚡ (${Math.round(robot.battery)}%)`, 'warn');
    return;
  }

  // ── FETCHING: stow task ──
  if (robot.status === 'fetching' && robot.fetchTask) {
    const ft = robot.fetchTask;

    if (ft.phase === 'goInput') {
      // Pick up pack from input
      const idx = inputQueue.indexOf(ft.pack);
      if (idx !== -1) inputQueue.splice(idx, 1);
      robot.carryingPack = { sku: ft.pack.sku, id: ft.pack.id };
      ft.phase = 'goShelf';
      addLog(`${robot.name} 📦 prelievo INPUT ${ft.pack.sku}`, 'success');
      navigateTo(robot, ft.destShelf.col, ft.destShelf.row);

    } else if (ft.phase === 'goShelf') {
      // Deposit pack on shelf
      ft.destShelf.hasPack = true;
      ft.destShelf.sku = robot.carryingPack?.sku || ft.pack.sku;
      robot.carryingPack = null;
      addLog(`${robot.name} 📦 depositato ${ft.destShelf.sku} in scaffale`, 'success');

      robot.fetchTask = null;
      // Now check if we need to charge before going idle
      if (robot.needsCharge) {
        sendToCharger(robot);
      } else {
        robot.status = 'idle';
        dispatchAll();
      }
    }
    return;
  }

  // ── MOVING: shipping order ──
  if (robot.status === 'moving') {
    if (robot.task && robot.task.status === 'picking') {
      // At the shelf — start picking
      robot.status = 'picking';
      robot.pickTimer = 1.2 + Math.random() * 0.8;
      robot.glowAlpha = 1;
      addLog(`${robot.name} picking ${robot.task.sku}`, 'success');

    } else if (robot.task && robot.task.status === 'delivering') {
      // At OUTPUT — deliver
      finishDelivery(robot);

    } else {
      // Stray state — reset
      robot.status = 'idle';
      robot.task = null;
    }
    return;
  }

  // Fallback
  robot.status = 'idle';
  robot.task = null;
}

function finishDelivery(robot) {
  if (!robot.task) {
    robot.status = 'idle';
    robot.carryingPack = null;
    return;
  }

  const order = robot.task;
  order.status = 'done';
  order.completedAt = simSeconds;
  completedOrders.push(order);

  outputQueue.push({ sku: robot.carryingPack?.sku || order.sku });
  robot.carryingPack = null;
  robot.task = null;

  addLog(`✓ ${order.id} consegnato [${order.sku}]`, 'success');
  renderOrders();

  // After delivery: check battery before accepting new task
  if (robot.needsCharge) {
    sendToCharger(robot);
  } else {
    robot.status = 'idle';
    dispatchAll();
  }
}

// ─── DRAWING ───
function drawWarehouse() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  COLS = Math.floor(canvas.width / CELL);
  ROWS = Math.floor(canvas.height / CELL);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Floor
  ctx.fillStyle = '#080e14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(0,212,255,0.04)';
  ctx.lineWidth = 1;
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
  }

  // Charging stations
  CHARGING_STATIONS.forEach(cs => {
    const x = cs.col * CELL, y = cs.row * CELL;
    ctx.fillStyle = 'rgba(255,204,0,0.06)';
    ctx.fillRect(x, y, CELL, CELL);
    ctx.strokeStyle = 'rgba(255,204,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
    ctx.fillStyle = 'rgba(255,204,0,0.6)';
    ctx.font = `${CELL * 0.4}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡', x + CELL / 2, y + CELL / 2);
  });

  // Output zone
  if (OUTPUT_ZONE) {
    const ox = OUTPUT_ZONE.col * CELL, oy = OUTPUT_ZONE.row * CELL;
    ctx.fillStyle = 'rgba(0,255,136,0.08)';
    ctx.fillRect(ox - CELL, oy - CELL, CELL * 3, CELL * 3);
    ctx.strokeStyle = 'rgba(0,255,136,0.4)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ox - CELL + 1, oy - CELL + 1, CELL * 3 - 2, CELL * 3 - 2);
    ctx.fillStyle = 'rgba(0,255,136,0.8)';
    ctx.font = 'bold 10px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('OUTPUT', ox + CELL / 2, oy + CELL / 2);
    if (outputQueue.length > 0) {
      ctx.fillStyle = 'rgba(0,255,136,0.9)';
      ctx.font = '9px Share Tech Mono, monospace';
      ctx.fillText(`📦 x${outputQueue.length}`, ox + CELL / 2, oy + CELL / 2 + 14);
    }
  }

  // Input zone
  if (INPUT_ZONE) {
    const ix = INPUT_ZONE.col * CELL, iy = INPUT_ZONE.row * CELL;
    ctx.fillStyle = 'rgba(0,212,255,0.06)';
    ctx.fillRect(ix - CELL, iy, CELL * 3, CELL * 2);
    ctx.strokeStyle = 'rgba(0,212,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(ix - CELL + 1, iy + 1, CELL * 3 - 2, CELL * 2 - 2);
    ctx.fillStyle = 'rgba(0,212,255,0.7)';
    ctx.font = 'bold 9px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('INPUT', ix + CELL / 2, iy + CELL);
    if (inputQueue.length > 0) {
      ctx.fillStyle = 'rgba(0,212,255,0.9)';
      ctx.font = '9px Share Tech Mono, monospace';
      ctx.fillText(`📦 x${inputQueue.length}`, ix + CELL / 2, iy + CELL + 14);
    }
  }

  // Shelves
  SHELVES.forEach(shelf => {
    const sx = shelf.col * CELL, sy = shelf.row * CELL;
    const active = shelf.active;
    const hasPack = shelf.hasPack;

    // Body
    ctx.fillStyle = active ? 'rgba(255,107,53,0.15)' : hasPack ? 'rgba(0,212,255,0.07)' : 'rgba(15,31,47,0.9)';
    ctx.fillRect(sx + 2, sy + 2, CELL - 4, CELL - 4);

    // Border
    ctx.strokeStyle = active ? '#ff6b35' : hasPack ? 'rgba(0,212,255,0.35)' : '#1a3a4a';
    ctx.lineWidth = active ? 1.5 : 1;
    ctx.strokeRect(sx + 2, sy + 2, CELL - 4, CELL - 4);

    // Rack lines
    if (!active) {
      ctx.strokeStyle = '#1a2a3a';
      ctx.lineWidth = 0.5;
      for (let i = 1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(sx + 3, sy + (CELL / 3) * i);
        ctx.lineTo(sx + CELL - 3, sy + (CELL / 3) * i);
        ctx.stroke();
      }
    }

    // SKU text
    ctx.fillStyle = active ? '#ff6b35' : hasPack ? 'rgba(0,212,255,0.6)' : '#2a4a5a';
    ctx.font = `${CELL * 0.17}px Share Tech Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(shelf.sku, sx + CELL / 2, sy + CELL / 2);

    // Pack dot
    if (hasPack && !active) {
      ctx.beginPath();
      ctx.arc(sx + CELL - 8, sy + 8, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#00d4ff';
      ctx.fill();
    }

    // Active glow
    if (active) {
      ctx.save();
      ctx.shadowColor = '#ff6b35';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ff6b35';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx + 1, sy + 1, CELL - 2, CELL - 2);
      ctx.restore();
    }
  });

  // Truck
  if (truck) {
    const tw = CELL * 2.2, th = CELL * 1.4;
    ctx.fillStyle = truck.state === 'loading' ? 'rgba(255,204,0,0.9)' : 'rgba(255,107,53,0.85)';
    ctx.fillRect(truck.x, truck.y, tw, th);
    ctx.strokeStyle = truck.state === 'loading' ? '#ffcc00' : '#ff6b35';
    ctx.lineWidth = 2;
    ctx.strokeRect(truck.x, truck.y, tw, th);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(truck.x, truck.y, tw * 0.3, th);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(truck.state === 'loading' ? 'CARICO' : '🚛', truck.x + tw / 2, truck.y + th / 2);
    if (truck.packCount > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = '8px Share Tech Mono, monospace';
      ctx.fillText(`x${truck.packCount}`, truck.x + tw / 2, truck.y + th / 2 + 12);
    }
  }

  // Robot trails
  robots.forEach(robot => {
    if (robot.trail.length < 2) return;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(robot.trail[0].x, robot.trail[0].y);
    robot.trail.forEach((pt, i) => { if (i > 0) ctx.lineTo(pt.x, pt.y); });
    ctx.strokeStyle = robot.color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.18;
    ctx.stroke();
    ctx.restore();
  });

  // Robots
  robots.forEach(robot => {
    const rx = robot.x, ry = robot.y;
    const r = CELL * 0.28;

    // Carried pack indicator
    if (robot.carryingPack) {
      ctx.fillStyle = 'rgba(0,212,255,0.25)';
      ctx.fillRect(rx - 8, ry - 16, 16, 10);
      ctx.strokeStyle = '#00d4ff';
      ctx.lineWidth = 1;
      ctx.strokeRect(rx - 8, ry - 16, 16, 10);
      ctx.fillStyle = 'rgba(0,212,255,0.9)';
      ctx.font = '6px Share Tech Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PKG', rx, ry - 11);
    }

    // Picking glow
    if (robot.status === 'picking' && robot.glowAlpha > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(rx, ry, r * 2.5, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(rx, ry, 0, rx, ry, r * 2.5);
      grad.addColorStop(0, `${robot.color}${Math.floor(robot.glowAlpha * 80).toString(16).padStart(2,'0')}`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    // Shadow/glow
    ctx.save();
    ctx.shadowColor = robot.color;
    ctx.shadowBlur = robot.status === 'idle' || robot.status === 'charging' ? 4 : 14;

    // Body
    ctx.beginPath();
    ctx.arc(rx, ry, r, 0, Math.PI * 2);
    ctx.fillStyle = '#0b1118';
    ctx.fill();
    ctx.strokeStyle = robot.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Direction arrow while moving
    if (robot.targetX !== null && ['moving','fetching','goCharge'].includes(robot.status)) {
      const ang = Math.atan2(robot.targetY - ry, robot.targetX - rx);
      ctx.save();
      ctx.strokeStyle = robot.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rx + Math.cos(ang) * r * 0.5, ry + Math.sin(ang) * r * 0.5);
      ctx.lineTo(rx + Math.cos(ang) * r * 1.6, ry + Math.sin(ang) * r * 1.6);
      ctx.stroke();
      ctx.restore();
    }

    // Robot ID
    ctx.fillStyle = robot.color;
    ctx.font = `bold ${CELL * 0.2}px Share Tech Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(robot.name.split('-')[1], rx, ry);

    // Battery arc (outside ring)
    const battFrac = robot.battery / 100;
    ctx.beginPath();
    ctx.arc(rx, ry, r + 4, -Math.PI / 2, -Math.PI / 2 + battFrac * Math.PI * 2);
    ctx.strokeStyle = robot.battery < 25 ? '#ff3366' : robot.battery < 50 ? '#ffcc00' : '#00ff88';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Charging icon
    if (robot.status === 'charging') {
      ctx.fillStyle = '#ffcc00';
      ctx.font = `${CELL * 0.3}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚡', rx, ry - r - 10);
    }

    // needsCharge warning dot
    if (robot.needsCharge && robot.status !== 'charging' && robot.status !== 'goCharge') {
      ctx.beginPath();
      ctx.arc(rx + r * 0.7, ry - r * 0.7, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff3366';
      ctx.fill();
    }
  });
}

// ─── METRICS ───
function updateMetrics() {
  const elapsedHr = simSeconds / 3600;
  const throughput = elapsedHr > 0 ? Math.round(completedOrders.length / Math.max(elapsedHr, 1 / 60)) : 0;
  document.getElementById('kpiOrders').textContent = throughput;
  document.getElementById('kpiKm').textContent = totalKm.toFixed(1);

  const avgPick = completedOrders.length > 0
    ? Math.round(completedOrders.reduce((a, o) => a + ((o.completedAt || 0) - (o.startedAt || 0)), 0) / completedOrders.length)
    : 0;
  document.getElementById('kpiPicking').textContent = avgPick;
  document.getElementById('kpiDone').textContent = completedOrders.length;

  const active = robots.filter(r => !['idle','charging'].includes(r.status)).length;
  const inQueue = orders.filter(o => o.status === 'pending').length;
  const efficiency = robots.length > 0 ? Math.round((active / robots.length) * 100) : 0;

  document.getElementById('ftTotal').textContent = completedOrders.length;
  document.getElementById('ftActive').textContent = active;
  document.getElementById('ftQueue').textContent = inQueue;
  document.getElementById('ftEfficiency').textContent = efficiency + '%';

  const t = Math.floor(simSeconds);
  const hrs  = Math.floor(t / 3600);
  const mins = Math.floor((t % 3600) / 60);
  const secs = t % 60;
  document.getElementById('simTime').textContent =
    `SIM TIME: ${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  document.getElementById('ftUptime').textContent =
    `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
}

function renderRobotCards() {
  const el = document.getElementById('robotCards');
  const statusMap = {
    idle: 'In attesa', moving: 'Consegna', picking: 'Picking',
    charging: 'Ricarica', goCharge: 'Verso ricarica', fetching: 'Stow input'
  };
  el.innerHTML = robots.map(r => {
    const batt = Math.round(r.battery);
    const battColor = batt < 25 ? '#ff3366' : batt < 50 ? '#ffcc00' : '#00ff88';
    const statusTxt = statusMap[r.status] || r.status;
    const extra = r.task ? r.task.sku : (r.fetchTask ? r.fetchTask.pack?.sku : '');
    const cardClass = ['charging','goCharge'].includes(r.status) ? 'charging' : r.status !== 'idle' ? 'active' : '';
    return `<div class="robot-card ${cardClass}">
      <div class="robot-dot" style="background:${r.color}"></div>
      <div class="robot-info">
        <div class="robot-name">${r.name}</div>
        <div class="robot-status-text">${statusTxt}${extra ? ' · ' + extra : ''}${r.needsCharge ? ' ⚠' : ''}</div>
      </div>
      <div class="battery-bar">
        <div class="battery-fill" style="width:${batt}%;background:${battColor}"></div>
      </div>
    </div>`;
  }).join('');
}

function renderOrders() {
  const el = document.getElementById('ordersList');
  const visible = [...orders].reverse().slice(0, 20);
  el.innerHTML = visible.map(o => {
    const labelMap = { pending: 'ATTESA', picking: 'PICKING', delivering: 'CONSEGNA', done: 'FATTO' };
    const cls = o.status === 'done' ? 'done' : ['picking','delivering'].includes(o.status) ? 'picking' : 'pending';
    return `<div class="order-item ${cls}">
      <div class="order-id">${o.id}</div>
      <div class="order-sku">${o.sku}</div>
      <div class="order-status-badge">${labelMap[o.status] || o.status.toUpperCase()}</div>
    </div>`;
  }).join('');
}

function addLog(msg, type = 'info') {
  const t = Math.floor(simSeconds);
  const h = String(Math.floor(t / 3600)).padStart(2,'0');
  const m = String(Math.floor((t % 3600) / 60)).padStart(2,'0');
  const s = String(t % 60).padStart(2,'0');
  logEntries.unshift({ msg, type, ts: `${h}:${m}:${s}` });
  if (logEntries.length > 60) logEntries.pop();
  const el = document.getElementById('eventLog');
  el.innerHTML = logEntries.slice(0, 30).map(e =>
    `<div class="log-entry ${e.type}">[${e.ts}] ${e.msg}</div>`
  ).join('');
}

// ─── INIT ───
function init() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  COLS = Math.floor(canvas.width  / CELL);
  ROWS = Math.floor(canvas.height / CELL);

  buildLayout();
  initRobots();

  // Pre-fill ~50% of shelves with packs
  SHELVES.forEach((s, i) => { s.hasPack = Math.random() < 0.7 });

  // Seed input packs
  for (let i = 0; i < 4; i++) spawnInputPack();

  // Seed orders
  for (let i = 0; i < 4; i++) addOrder();

  addLog('Sistema warehouse avviato', 'success');
  addLog('5 robot AMR online', 'info');
  addLog('Ricarica automatica <25% — completa al 100%', 'info');
  addLog('A* pathfinding attivo — solo corridoi', 'info');

  requestAnimationFrame(ts => { lastTime = ts; update(ts); });
}

// ─── CONTROLS ───
document.getElementById('btnPause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶ Avvia' : '⏸ Pausa';
});
document.getElementById('btnAddOrder').addEventListener('click', addOrder);
document.getElementById('btnBatchOrder').addEventListener('click', () => addBatchOrders(5));
document.getElementById('speedUp').addEventListener('click', () => {
  speedMult = Math.min(10, speedMult + (speedMult < 2 ? 0.5 : 1));
  document.getElementById('speedVal').textContent = speedMult + '×';
});
document.getElementById('speedDown').addEventListener('click', () => {
  speedMult = Math.max(0.5, speedMult - (speedMult <= 2 ? 0.5 : 1));
  document.getElementById('speedVal').textContent = speedMult + '×';
});

window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  COLS = Math.floor(canvas.width  / CELL);
  ROWS = Math.floor(canvas.height / CELL);
  buildLayout();
});

window.addEventListener('load', init);
</script>
</body>
</html>
